name: open-webui
services:
  open-webui:
    cpu_shares: 50
    command: []
    container_name: open-webui
    deploy:
      resources:
        limits:
          memory: 2048M
    hostname: open-webui
    image: ghcr.io/open-webui/open-webui:latest
    labels:
      icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/open-webui.svg
    ports:
      - target: 8080
        published: "3000"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /docker/open-webui
        target: /app/backend/data
    devices: []
    cap_add: []
    environment: []
    network_mode: bridge
    privileged: false
x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  author: self
  category: Chat
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/open-webui.svg
  index: /
  is_uncontrolled: false
  port_map: "3000"
  scheme: http
  store_app_id: open-webui
  title:
    custom: Open WebUI
    en_us: open-webui

x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
    - "386"
  main: tailscale
  category: Network
  developer: Tailscale Inc.
  author: CasaOS Team
  tagline:
    en_US: Chat with AI the way you want.
  description:
    en_US: |
      Open WebUI is an open‑source, self‑hosted web interface that lets you interact with large language models (LLMs) directly from your browser. 
      It bundles a fast, user‑friendly chat experience with flexible integration options—including plugin support and custom data pipelines—making it ideal for developers and hobbyists who want to run private AI services without relying on cloud APIs. 
      Its strengths lie in its modular architecture, straightforward Docker deployment, extensive community contributions, and the ability to securely host advanced LLM workloads behind a simple web UI.

